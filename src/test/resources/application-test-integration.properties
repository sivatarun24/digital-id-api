# Integration test profile — used by *IT.java classes via @ActiveProfiles("test-integration")
# Datasource is overridden at runtime via @DynamicPropertySource in AbstractIntegrationTest
# (Testcontainers starts a real MySQL 8 container and injects the URL/credentials)

# JPA — create schema fresh from entities for each test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Disable external services that are not under test
app.kafka.enabled=false
app.redis.enabled=false

# JWT
app.jwt.secret=integration_test_secret_key_that_is_at_least_32_bytes

# Mail — point at a non-existent local SMTP so sends fail silently (caught in service)
spring.mail.host=localhost
spring.mail.port=2525
management.health.mail.enabled=false

app.mail.from-address=test@test.com
app.mail.from-name=TestApp

# Frontend URL (used in email links)
app.frontend.url=http://localhost:3000

# Logging — quieter for test runs
logging.level.com.digitalid.api=INFO
logging.level.org.hibernate.SQL=WARN
