# Database
spring.datasource.url=jdbc:mysql://localhost:3306/digital_id
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.hikari.maximum-pool-size=5

# Server
server.port=8080

# Mail (dev - update with real credentials)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:digitalid80@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from-address=digitalid80@gmail.com
app.mail.from-name=DigitalId

# Frontend URL for reset links
app.frontend.url=http://localhost:5173

# Logging
logging.level.com.digitalid.api=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Disable mail health check in dev
management.health.mail.enabled=false
