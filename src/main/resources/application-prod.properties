# Database - all from env vars in production
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# Server
server.port=${PORT:8080}
# Metrics/prometheus protected by X-Management-Secret header (set in Prometheus scrape config)
app.management.secret=${MANAGEMENT_SECRET:}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:digitadid80@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from-address=${MAIL_FROM_ADDRESS:digitadid80@gmail.com}
app.mail.from-name=${MAIL_FROM_NAME:Digital-Id}

# Frontend URL (allowed origin and Cloud Run service URL for IAM)
app.frontend.url=${FRONTEND_URL}
# Allowed IPs for backend access (comma-separated; Cloud Run frontend uses IAM, these are for optional allowlist)
app.security.allowed-ips=${ALLOWED_IPS:}
# Frontend Cloud Run service account (for validating invoker)
app.security.frontend-service-account=${FRONTEND_SERVICE_ACCOUNT:}

# Kafka (production)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:digital-id-group}
spring.kafka.consumer.auto-offset-reset=earliest
app.kafka.topics.events=${KAFKA_TOPIC_EVENTS:app-events}

# Redis (production - e.g. Memorystore)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000ms}

# Logging
logging.level.com.astr.react_backend=INFO
logging.level.org.hibernate.SQL=WARN

# Security headers
server.error.include-stacktrace=never
server.error.include-message=never
