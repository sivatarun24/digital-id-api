spring.application.name=react-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:this_is_a_very_long_secret_key_that_is_at_least_32_bytes}

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true

# Publish histogram buckets for p50/p95/p99 in Prometheus
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,500ms,1s,5s
