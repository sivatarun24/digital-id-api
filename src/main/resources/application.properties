spring.application.name=digital-id-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# JWT
app.jwt.secret=${JWT_SECRET:this_is_a_very_long_secret_key_that_is_at_least_32_bytes}

# Actuator & Prometheus (metrics on management port in prod - not exposed on main port)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,500ms,1s,5s

# Kafka (overridable via env; set app.kafka.enabled=false to disable)
app.kafka.enabled=${KAFKA_ENABLED:true}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:digital-id-api-group}
spring.kafka.consumer.auto-offset-reset=earliest
app.kafka.topics.events=${KAFKA_TOPIC_EVENTS:app-events}

# Redis (overridable via env; set app.redis.enabled=false to disable)
app.redis.enabled=${REDIS_ENABLED:true}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# Database (defaults; overridden by profile-specific properties)
spring.datasource.url=jdbc:mysql://localhost:3306/digital_id?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP base defaults (overridden per profile)
spring.datasource.hikari.pool-name=digital-id-pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# File uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.uploads.dir=${UPLOADS_DIR:uploads}
ocr.tessdata.path=${TESSDATA_PATH:/usr/share/tesseract-ocr/5/tessdata}

# GCS — set GCS_BUCKET_NAME env var to enable GCS storage in any environment (including local dev)
app.gcs.bucket=${GCS_BUCKET_NAME:}
