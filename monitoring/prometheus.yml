global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "react-backend"
    metrics_path: /actuator/prometheus
    scrape_interval: 5s
    static_configs:
      - targets: ["app:8080", "host.docker.internal:8080"]
        labels:
          application: "react-backend"
          environment: "dev"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
