name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  ARTIFACT_REGISTRY: ${{ secrets.GCP_REGION || 'us-central1' }}-docker.pkg.dev
  IMAGE_NAME: digital-id/backend
  CLOUD_RUN_SERVICE: digital-id-backend
  CLOUD_RUN_SERVICE_FRONTEND: ${{ vars.CLOUD_RUN_SERVICE_FRONTEND || 'digital-id-frontend' }}

jobs:
  # ── Job 1: Test ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw verify -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  # ── Job 2: Build & Push Docker Image ───────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_TAG="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"
          IMAGE_LATEST="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:latest"
          echo "tags=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "latest=${IMAGE_LATEST}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.meta.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy Backend to Cloud Run ─────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend to Cloud Run
        id: deploy
        env:
          CLOUD_SQL_INSTANCE: ${{ secrets.CLOUD_SQL_INSTANCE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          VPC_CONNECTOR: ${{ secrets.VPC_CONNECTOR }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{secrets.MAIL_PASSWORD}}
          MAIL_FROM_ADDRESS: ${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
          MANAGEMENT_SECRET: ${{ secrets.MANAGEMENT_SECRET }}
          GCS_BUCKET_NAME: ${{secrets.GCS_BUCKET_NAME}}
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"

          # Write env vars to a YAML file — avoids all special character escaping issues
          cat > /tmp/env-vars.yaml << EOF
          SPRING_PROFILES_ACTIVE: "prod"
          KAFKA_ENABLED: "true"
          REDIS_ENABLED: "true"
          DATABASE_URL: "${DATABASE_URL}"
          DATABASE_USERNAME: "${DATABASE_USERNAME}"
          DATABASE_PASSWORD: "${DATABASE_PASSWORD}"
          JWT_SECRET: "${JWT_SECRET}"
          FRONTEND_URL: "${FRONTEND_URL}"
          KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS}"
          REDIS_HOST: "${REDIS_HOST}"
          REDIS_PORT: "${REDIS_PORT}"
          VPC_CONNECTOR: "${VPC_CONNECTOR}"
          MANAGEMENT_SECRET: "${MANAGEMENT_SECRET}"
          MAIL_HOST: "${MAIL_HOST}"
          MAIL_PORT: "${MAIL_PORT}"
          MAIL_USERNAME: "${MAIL_USERNAME}"
          MAIL_PASSWORD: "${MAIL_PASSWORD}"
          MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS}"
          GCS_BUCKET_NAME: "{GCS_BUCKET_NAME}"
          EOF

          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image="$IMAGE" \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --add-cloudsql-instances="${CLOUD_SQL_INSTANCE}" \
            --vpc-connector="${VPC_CONNECTOR}" \
            --vpc-egress=private-ranges-only \
            --env-vars-file=/tmp/env-vars.yaml \
          --set-secrets="REDIS_PASSWORD=digital-id-redis-password:latest"

      - name: Grant Frontend service account permission to invoke Backend
        run: |
          PROJECT_ID="${{ env.GCP_PROJECT_ID }}"
          REGION="${{ env.GCP_REGION }}"
          BACKEND_SERVICE="${{ env.CLOUD_RUN_SERVICE }}"
          FRONTEND_SA="${{ secrets.FRONTEND_SERVICE_ACCOUNT }}"
          
          if [ -z "$FRONTEND_SA" ]; then
            echo "ERROR: FRONTEND_SERVICE_ACCOUNT secret is not set"
            exit 1
          fi
          
          gcloud run services add-iam-policy-binding "$BACKEND_SERVICE" \
            --region="$REGION" \
            --project="$PROJECT_ID" \
            --member="serviceAccount:${FRONTEND_SA}" \
            --role="roles/run.invoker"
          
          echo "✅ Granted invoker role to $FRONTEND_SA on $BACKEND_SERVICE"
